<div class="container" style="max-width: 1400px; padding: 24px 0;">
  <h1 style="margin: 0 0 16px;">ERPNext Ecommerce API Docs</h1>
  <p style="margin: 0 0 18px; color: #555;">
    OpenAPI + Swagger UI for custom ERPNext ecommerce integration methods.
  </p>
  <div id="swagger-ui"></div>
</div>

<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
  window.addEventListener("load", function () {
    const url = "/api/method/erpnext.erpnext_integrations.ecommerce_api.openapi.get_openapi_spec";

    fetch(url, { credentials: "same-origin" })
      .then((res) => res.json())
      .then((payload) => {
        const spec = payload && payload.message ? payload.message : payload;
        window.ui = SwaggerUIBundle({
          spec: spec,
          dom_id: "#swagger-ui",
          deepLinking: true,
          displayRequestDuration: true,
          tryItOutEnabled: true,
          docExpansion: "list",
        });
      })
      .catch((err) => {
        const el = document.getElementById("swagger-ui");
        if (el) {
          el.innerHTML =
            '<div style="color:#b42318;font-weight:600">Failed to load OpenAPI spec.</div>' +
            '<pre style="white-space:pre-wrap">' + String(err) + "</pre>";
        }
      });
  });
</script>
